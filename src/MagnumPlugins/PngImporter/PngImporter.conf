# [configuration_]
[configuration]
# Override image channel count. Allowed values are 0-4, with zero keeping the
# original channel count. If set to something different than the image has,
# libpng is instructed to perform conversion between grayscale and RGB, alpha
# channel addition or removal, or a combination of the two. The main rules
# are the following:
#
# - for a two- and four-channel output, the last channel is treated as alpha,
#   and either copied from the source (if it's two-/four-channel) or set to
#   255 / 65535
# - reducing a three- or four-channel image to one or two channels will cause
#   the first channel to be filled with Y (luminance) of the RGB input, the
#   second (if any) channel is then alpha, filled according to the first rule
# - expanding a single- or two-channel image to three or four channels will
#   cause the first channel to be repeated three times and second channel (if
#   any) treated as alpha according to the first rule
forceChannelCount=0

# Override channel bit depth. Allowed values are 0, 8 and 16, with zero
# keeping the original bit depth.
forceBitDepth=0

# According to the PNG standard, the alpha is stored unpremultiplied in the
# file, and by default it's passed through unchanged. Set to `premultiplied`
# to scale the RGB channels by the alpha on import, applying sRGB decoding
# and encoding in the process unless the file explicitly says it contains a
# linear colorspace; and to `premultipliedLinear` to scale the RGB channels
# by the alpha without any sRGB decoding and encoding, no matter what the
# file says. To better preserve precision of the premultiplied output you may
# also want to set forceBitDepth to 16.
alphaMode=
# [configuration_]
